<!DOCTYPE html>
<html lang="id">

<head>
    {% set page_title = "Login Member | " ~ warnet_title %}
    {% include 'public/components/_head.html' %}
    <!-- CSRF token needed for login form AJAX -->
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <style>
        input[type="text"],
        input[type="password"] {
            background-color: #0a0a0a !important;
            border-color: #2a2a2a !important;
            color: #e5e5e5 !important;
            border-width: 1px !important;
            border-style: solid !important;
            border-radius: 6px !important;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out !important;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #555 !important;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05) !important;
            outline: none !important;
        }
    </style>
</head>

<body
    class="bg-[#050505] text-neutral-200 min-h-screen flex items-center justify-center p-4 font-space-grotesk antialiased">
    <div class="w-full max-w-sm">

        <!-- Logo / Brand Header -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-neutral-100 mb-4 shadow-lg shadow-white/5">
                <span class="text-[#050505] font-black text-lg">TM</span>
            </div>
            <h1 class="text-2xl font-bold text-neutral-100 tracking-tight">{{ warnet_title }}</h1>
            <p class="text-neutral-500 text-xs mt-1 font-mono uppercase tracking-wider">Member Portal</p>
        </div>

        <!-- Card Container -->
        <div class="bg-[#111] border border-[#1f1f1f] rounded-xl p-8 shadow-2xl shadow-black/80">
            <h2 class="text-xs lg:text-sm font-bold text-neutral-300 mb-6 text-center">Masuk ke Portal Statistik Anda
            </h2>

            <!-- Error Box -->
            <div id="error-box"
                class="hidden mb-5 p-3.5 bg-red-950/20 border border-red-800/30 rounded-lg flex items-start gap-2.5">
                <svg class="w-4 h-4 text-red-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span id="error-text" class="text-xs lg:text-sm text-red-400 leading-tight"></span>
            </div>

            <!-- Login Form -->
            <form onsubmit="submitLogin(event)" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-xs lg:text-sm font-semibold text-neutral-400">Username Member</label>
                    <input type="text" id="username" placeholder="Masukkan username member" required autofocus
                        class="w-full px-4 py-3 text-xs lg:text-base focus:outline-none">
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs lg:text-sm font-semibold text-neutral-400">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required
                        class="w-full px-4 py-3 text-xs lg:text-base focus:outline-none">
                </div>

                <button type="submit" id="btn-login"
                    class="w-full py-2.5 bg-neutral-100 hover:bg-white text-black rounded-lg font-bold text-xs lg:text-base transition-all flex items-center justify-center gap-2 shadow-lg shadow-white/5 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btn-text">Masuk</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </form>
        </div>

        <div class="text-center mt-6">
            <a href="/"
                class="inline-flex items-center gap-1.5 text-xs text-neutral-500 hover:text-neutral-300 font-mono transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Kembali ke Beranda
            </a>
        </div>

        <div class="text-center text-neutral-600 text-[10px] lg:text-xs mt-8 font-mono">
            <div>{{ warnet_title }} - Portal Member</div>
            <div class="mt-1">TMBilling {{ version }} &copy; 2026</div>
        </div>
    </div>

    <script>
        async function submitLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-text');
            const errorBox = document.getElementById('error-box');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

            if (!username || !password) {
                showError('Username dan password wajib diisi.');
                return;
            }

            btn.disabled = true;
            btnText.innerText = 'Memverifikasi...';
            errorBox.classList.add('hidden');

            try {
                const res = await fetch('/member/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    btnText.innerText = 'Berhasil';
                    btn.classList.replace('bg-neutral-100', 'bg-emerald-600');
                    btn.classList.replace('text-black', 'text-white');
                    setTimeout(() => { window.location.href = data.redirect; }, 500);
                } else {
                    showError(data.error || 'Username atau password salah');
                    btnText.innerText = 'Masuk';
                    btn.disabled = false;
                }
            } catch (err) {
                showError('Gagal terhubung ke server TMBilling.');
                btnText.innerText = 'Masuk';
                btn.disabled = false;
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-box');
            const errorText = document.getElementById('error-text');
            errorText.innerText = msg;
            errorBox.classList.remove('hidden');
        }
    </script>
</body>

</html>
