<!--
  _footer.html — Shared footer component
  Variabel yang dibutuhkan:
    - warnet_title : string — Nama warnet
    - footer_label : string — Label kanan, contoh: "E-Sports & Gaming Arena" atau "Portal Member"
-->

<footer class="w-full bg-[#080808] border-t border-[#1f1f1f] py-6 px-6 mt-auto font-mono text-xs text-neutral-600">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-2 text-center md:text-left">
        <div>{{ warnet_title }} - {{ footer_label }}</div>
        <div>TMBilling v1.0 &copy; 2026</div>
    </div>
</footer>
