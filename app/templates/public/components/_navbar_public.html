<!--
  _navbar_public.html — Navbar untuk landing page publik (home.html)
  Variabel yang dibutuhkan:
    - warnet_title : string — Nama warnet
-->

<header class="w-full bg-[#0a0a0a]/90 backdrop-blur-md border-b border-[#1f1f1f] h-16 lg:h-20 flex items-center justify-between px-6 sticky top-0 z-50 shrink-0">
    <!-- Brand / Logo -->
    <div class="flex items-center gap-3">
        <a href="/" class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-neutral-100 flex items-center justify-center">
                <span class="text-[#050505] font-black text-sm">TM</span>
            </div>
            <div>
                <h1 class="text-sm lg:text-base font-extrabold text-neutral-100 leading-none">{{ warnet_title }}</h1>
                <p class="text-[9px] lg:text-[10px] text-neutral-500 font-mono tracking-wider uppercase mt-1">E-Sports &amp; Gaming Arena</p>
            </div>
        </a>
    </div>
    
    <!-- Central Navigation Links (Hidden on small mobile, flex on desktop) -->
    <nav class="hidden md:flex items-center gap-6 text-xs lg:text-sm font-semibold text-neutral-400">
        <a href="/" class="hover:text-neutral-100 transition-colors">Beranda</a>
        <a href="/livepc" class="hover:text-neutral-100 transition-colors">Peta PC Live</a>
        <a href="/paket" class="hover:text-neutral-100 transition-colors">Daftar Paket</a>
        <a href="/spesifikasi" class="hover:text-neutral-100 transition-colors">Spesifikasi PC</a>
    </nav>
    
    <!-- Right Actions -->
    <div class="flex items-center gap-3">
        <a href="/member/login" 
            class="px-4 py-2 bg-neutral-100 hover:bg-white text-black text-xs lg:text-sm font-bold rounded-lg transition-all flex items-center gap-2 shadow-lg shadow-white/5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            <span class="hidden sm:inline">Portal Member</span>
            <span class="sm:hidden">Member</span>
        </a>

        <!-- Hamburger Button (Mobile Only) -->
        <button id="mobile-menu-toggle" class="md:hidden p-2 text-neutral-400 hover:text-neutral-100 bg-neutral-900 border border-neutral-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-neutral-700">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path id="hamburger-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
    </div>
</header>

<!-- Mobile Navigation Drawer Overlay -->
<div id="mobile-drawer" class="fixed inset-0 z-40 bg-[#050505]/98 backdrop-blur-lg md:hidden transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col pt-24 px-8 space-y-6">
    <div class="flex flex-col space-y-6 text-lg font-bold text-neutral-300">
        <a href="/" class="hover:text-neutral-100 transition-colors border-b border-[#1f1f1f] pb-3">Beranda</a>
        <a href="/livepc" class="hover:text-neutral-100 transition-colors border-b border-[#1f1f1f] pb-3">Peta PC Live</a>
        <a href="/paket" class="hover:text-neutral-100 transition-colors border-b border-[#1f1f1f] pb-3">Daftar Paket</a>
        <a href="/spesifikasi" class="hover:text-neutral-100 transition-colors border-b border-[#1f1f1f] pb-3">Spesifikasi PC</a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const toggleBtn = document.getElementById('mobile-menu-toggle');
        const drawer = document.getElementById('mobile-drawer');
        const iconPath = document.getElementById('hamburger-icon');

        if (toggleBtn && drawer && iconPath) {
            let isOpen = false;

            toggleBtn.addEventListener('click', () => {
                isOpen = !isOpen;
                if (isOpen) {
                    drawer.classList.remove('translate-x-full');
                    iconPath.setAttribute('d', 'M6 18L18 6M6 6l12 12');
                } else {
                    drawer.classList.add('translate-x-full');
                    iconPath.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
                }
            });

            drawer.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    drawer.classList.add('translate-x-full');
                    iconPath.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
                    isOpen = false;
                });
            });
        }
    });
</script>
