<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Ditolak — TMBilling</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
</head>
<body class="bg-surface text-neutral-200 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-card border border-red-500/30 rounded-xl p-8 text-center">
        <div class="text-6xl mb-4">🚫</div>
        <h1 class="text-2xl font-bold text-red-400 mb-2">Akses Ditolak</h1>
        <p class="text-neutral-400 mb-4 text-sm">
            IP Anda tidak termasuk dalam whitelist yang diizinkan.
        </p>
        <div class="bg-surface border border-border rounded-lg p-4 mb-4">
            <p class="text-[10px] uppercase text-neutral-500 font-bold tracking-wider mb-1">IP Anda</p>
            <p class="font-mono font-bold text-lg text-neutral-200">{{ ip }}</p>
        </div>
        <p class="text-xs text-neutral-500">
            Hubungi admin warnet jika ini kesalahan.
        </p>
    </div>
</body>
</html>
