<!-- ===== TAB: SERVER STATISTIC ===== -->
<div id="tab-server_statistic" class="tab-content hidden">
    <div class="bg-[#0c0c0c] border border-[#1c1c1c] rounded p-6 mb-6">
        <div class="flex flex-wrap items-center justify-between mb-6 gap-3">
            <h3 class="text-xs lg:text-[22px] font-bold text-neutral-200 uppercase tracking-wider flex items-center gap-2">
                <svg class="w-5 h-5 lg:w-6 lg:h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                Server Statistic
            </h3>
            <div class="flex items-center gap-4">
                <span id="sm-status" class="text-xs lg:text-base text-neutral-500 font-mono flex items-center gap-1.5"><span class="w-2 h-2 lg:w-2.5 lg:h-2.5 rounded-full bg-neutral-600"></span> Menghubungkan...</span>
                
                <!-- LHM Toggle -->
                <div class="flex items-center gap-2 border border-[#262626] bg-[#171717] px-3 py-1.5 rounded text-xs lg:text-sm text-neutral-300 font-bold">
                    <span class="mr-1">LHM Engine</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="lhm-toggle" class="sr-only peer" onchange="ServerMonitor.toggleLHM(this.checked)">
                        <div class="w-9 h-5 bg-neutral-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                    </label>
                </div>

                <button onclick="ServerMonitor.fetchMetrics()" class="px-4 py-2 bg-[#171717] border border-[#262626] hover:bg-[#222] text-neutral-300 text-xs lg:text-base font-bold rounded transition-colors flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5 lg:w-4 lg:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Refresh
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-5">
            <!-- CPU DETAIL -->
            <div class="bg-[#111] border border-[#1c1c1c] rounded-xl p-5 shadow-sm flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-baseline border-b border-[#1c1c1c] pb-3 mb-4">
                        <span class="text-sm lg:text-base font-bold text-neutral-300 flex items-center gap-2">
                            <svg class="w-4 h-4 lg:w-5 lg:h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                            Processor (CPU)
                        </span>
                        <span id="sm-cpu-val" class="text-xl lg:text-2xl font-black text-neutral-100 font-mono">0%</span>
                    </div>
                    <div class="text-xs lg:text-sm text-neutral-400 font-mono mb-4 leading-relaxed" id="sm-cpu-name">Memuat nama processor...</div>
                </div>
                <div>
                    <div class="h-3 w-full bg-[#1a1a1a] rounded-full overflow-hidden mb-4">
                        <div id="sm-cpu-bar" class="h-full bg-emerald-500 rounded-full transition-all duration-500 w-0"></div>
                    </div>
                    <div class="flex justify-between text-xs lg:text-sm text-neutral-500 font-mono bg-[#0c0c0c] p-3 rounded-lg border border-[#1a1a1a]">
                        <span id="sm-cpu-cores">0 Cores / 0 Threads</span>
                        <div class="flex gap-4">
                            <span id="sm-cpu-freq" class="text-emerald-500 font-bold">0 MHz</span>
                            <span id="sm-cpu-temp" class="text-rose-500 font-bold">0 °C</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- RAM DETAIL -->
            <div class="bg-[#111] border border-[#1c1c1c] rounded-xl p-5 shadow-sm flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-baseline border-b border-[#1c1c1c] pb-3 mb-4">
                        <span class="text-sm lg:text-base font-bold text-neutral-300 flex items-center gap-2">
                            <svg class="w-4 h-4 lg:w-5 lg:h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            Memory (RAM)
                        </span>
                        <span id="sm-ram-val" class="text-xl lg:text-2xl font-black text-neutral-100 font-mono">0%</span>
                    </div>
                </div>
                <div>
                    <div class="h-3 w-full bg-[#1a1a1a] rounded-full overflow-hidden mb-4 mt-auto">
                        <div id="sm-ram-bar" class="h-full bg-blue-500 rounded-full transition-all duration-500 w-0"></div>
                    </div>
                    <div class="flex justify-between text-xs lg:text-sm text-neutral-500 font-mono bg-[#0c0c0c] p-3 rounded-lg border border-[#1a1a1a]">
                        <span id="sm-ram-used">0 GB Terpakai</span>
                        <span id="sm-ram-total" class="text-blue-500 font-bold">Total: 0 GB</span>
                    </div>
                </div>
            </div>

            <!-- GPU LIST DETAIL -->
            <div class="bg-[#111] border border-[#1c1c1c] rounded-xl p-5 shadow-sm flex flex-col justify-between" id="sm-gpu-container" style="display:none;">
                <div class="flex justify-between items-baseline border-b border-[#1c1c1c] pb-3 mb-4">
                    <span class="text-sm lg:text-base font-bold text-neutral-300 flex items-center gap-2">
                        <svg class="w-4 h-4 lg:w-5 lg:h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path></svg>
                        Graphics Processing Unit (GPU)
                    </span>
                </div>
                <div id="sm-gpu-list" class="space-y-4"></div>
            </div>

            <!-- DISK LIST DETAIL -->
            <div class="bg-[#111] border border-[#1c1c1c] rounded-xl p-5 shadow-sm xl:col-span-2">
                <div class="flex justify-between items-baseline border-b border-[#1c1c1c] pb-3 mb-4">
                    <span class="text-sm lg:text-base font-bold text-neutral-300 flex items-center gap-2">
                        <svg class="w-4 h-4 lg:w-5 lg:h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                        Storage Devices (Partisi Disk)
                    </span>
                </div>
                <div id="sm-disk-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                    <div class="text-xs lg:text-sm text-neutral-600 font-mono italic">Memuat partisi...</div>
                </div>
            </div>
            
            <!-- NETWORK LIST DETAIL -->
            <div class="bg-[#111] border border-[#1c1c1c] rounded-xl p-5 shadow-sm">
                <div class="flex justify-between items-baseline border-b border-[#1c1c1c] pb-3 mb-4">
                    <span class="text-sm lg:text-base font-bold text-neutral-300 flex items-center gap-2">
                        <svg class="w-4 h-4 lg:w-5 lg:h-5 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                        Network Interfaces
                    </span>
                </div>
                <div id="sm-nic-list" class="space-y-4">
                    <div class="text-xs lg:text-sm text-neutral-600 font-mono italic">Memuat adapter jaringan...</div>
                </div>
            </div>
        </div>
    </div>
</div>
