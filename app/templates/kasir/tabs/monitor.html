<!-- ===== TAB: MONITOR ===== -->
<div id="tab-monitor" class="tab-content hidden">
    <div class="bg-[#0c0c0c] border border-[#1c1c1c] rounded p-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-xs lg:text-[22px] font-bold text-neutral-200 uppercase tracking-wider">Monitor Hardware</h3>
            <button onclick="Monitor.load()"
                class="px-3 py-1.5 bg-[#171717] border border-[#262626] hover:bg-[#222] text-neutral-300 text-[10px] lg:text-base font-bold rounded transition-colors">↻ Refresh</button>
        </div>
        <div id="monitor-table" class="overflow-x-hidden w-full">
            <div class="flex justify-center py-10">
                <div class="w-6 h-6 border-2 border-[#1c1c1c] border-t-neutral-100 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>
