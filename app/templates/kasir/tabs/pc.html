<!-- ===== TAB: PC ===== -->
<div id="tab-pc" class="tab-content hidden space-y-6">
    <!-- PC Action Header -->
    <div class="bg-[#0c0c0c] border border-neutral-800 rounded-xl p-5">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
                <h3 class="text-sm font-semibold text-neutral-100">Unit PC</h3>
                <p class="text-xs text-neutral-500 mt-0.5">Kelola stasiun warnet — tambah satu per satu atau secara massal</p>
            </div>
            {% if session.get('kasir_role') == 'admin' %}
            <div class="flex items-center gap-2">
                <button onclick="PC.showAddModal()"
                    class="px-4 py-2 text-sm font-medium text-black bg-emerald-500 hover:bg-emerald-400 rounded-lg transition-colors flex items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Tambah PC
                </button>
                <button onclick="PC.showAddBatchModal()"
                    class="px-4 py-2 text-sm font-medium text-neutral-400 bg-neutral-800 border border-neutral-700 hover:bg-neutral-700 rounded-lg transition-colors flex items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14v6m-3-3h6M6 10h2a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v2a2 2 0 002 2zm10 0h2a2 2 0 002-2V6a2 2 0 00-2-2h-2a2 2 0 00-2 2v2a2 2 0 002 2zM6 20h2a2 2 0 002-2v-2a2 2 0 00-2-2H6a2 2 0 00-2 2v2a2 2 0 002 2z"></path></svg>
                    Batch Import
                </button>
            </div>
            {% endif %}
        </div>
    </div>

    <div class="bg-[#0c0c0c] border border-neutral-800 rounded-xl p-5">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
            <h3 class="text-xs font-semibold text-neutral-500 uppercase tracking-wider">Daftar PC</h3>
            <div class="flex flex-wrap items-center gap-2">
                <input type="text" id="pc-search-input" placeholder="Cari PC / IP / MAC..."
                    class="px-3 py-2 bg-[#050505] border border-neutral-700 rounded-lg text-xs lg:text-base text-neutral-200 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 w-48"
                    onkeypress="if(event.key === 'Enter') PC.doSearch()">
                <select id="pc-grup-filter-select"
                    class="px-3 py-2 bg-[#050505] border border-neutral-700 rounded-lg text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500"
                    onchange="PC.doSearch()">
                    <option value="">Semua Grup</option>
                </select>
                <button onclick="PC.doSearch()"
                    class="px-4 py-2 text-sm font-medium text-black bg-emerald-500 hover:bg-emerald-400 rounded-lg transition-colors">Cari</button>
                <button onclick="PC.clearSearch()"
                    class="px-4 py-2 text-sm font-medium text-neutral-400 bg-neutral-800 border border-neutral-700 hover:bg-neutral-700 rounded-lg transition-colors">Reset</button>
            </div>
        </div>
        <div id="pc-table" class="overflow-x-hidden w-full">
            <div class="flex justify-center py-10">
                <div class="w-6 h-6 border-2 border-neutral-700 border-t-neutral-100 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>
