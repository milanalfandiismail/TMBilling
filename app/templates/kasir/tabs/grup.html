<!-- ===== TAB: GRUP ===== -->
<div id="tab-grup" class="tab-content hidden space-y-6">
    <!-- Grup Action Header -->
    <div class="bg-[#111] border border-[#1f1f1f] rounded-xl p-5">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
                <h3 class="text-sm lg:text-[22px] font-bold text-neutral-100 tracking-wide">Grup PC / Zona</h3>
                <p class="text-[10px] lg:text-base text-neutral-500 mt-0.5">Buat kelompok zona PC — setiap grup memiliki paket billing dan tarif tersendiri</p>
            </div>
            {% if session.get('kasir_role') == 'admin' %}
            <button onclick="Grup.showAddModal()"
                class="px-4 py-2.5 bg-neutral-100 hover:bg-white text-black text-xs lg:text-base font-bold rounded-lg transition-colors flex items-center gap-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Tambah Grup
            </button>
            {% endif %}
        </div>
    </div>

    <div class="bg-[#111] border border-[#1f1f1f] rounded-xl p-5">
        <h3 class="text-xs lg:text-[22px] font-bold text-neutral-400 uppercase tracking-wider mb-4">Daftar Grup</h3>
        <div id="grup-table">
            <div class="flex justify-center py-10">
                <div class="w-6 h-6 border-2 border-[#2a2a2a] border-t-neutral-100 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>
