<!-- ===== TAB: GRUP ===== -->
<div id="tab-grup" class="tab-content hidden space-y-6">
    <!-- Grup Action Header -->
    <div class="bg-[#0c0c0c] border border-neutral-800 rounded-xl p-5">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
                <h3 class="text-sm font-semibold text-neutral-100">Grup PC / Zona</h3>
                <p class="text-xs text-neutral-500 mt-0.5">Buat kelompok zona PC — setiap grup memiliki paket billing dan tarif tersendiri</p>
            </div>
            {% if session.get('kasir_role') == 'admin' %}
            <button onclick="Grup.showAddModal()"
                class="px-4 py-2 text-sm font-medium text-black bg-emerald-500 hover:bg-emerald-400 rounded-lg transition-colors flex items-center gap-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Tambah Grup
            </button>
            {% endif %}
        </div>
    </div>

    <div class="bg-[#0c0c0c] border border-neutral-800 rounded-xl p-5">
        <h3 class="text-xs font-semibold text-neutral-500 uppercase tracking-wider mb-4">Daftar Grup</h3>
        <div id="grup-table">
            <div class="flex justify-center py-10">
                <div class="w-6 h-6 border-2 border-neutral-700 border-t-neutral-100 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>
