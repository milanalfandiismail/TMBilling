<!-- ===== TAB: BLACKOUT ===== -->
<div id="tab-blackout" class="tab-content hidden space-y-4">
    <div class="flex items-center justify-between">
        <h3 class="text-xs lg:text-[22px] font-bold text-amber-500 uppercase tracking-wider">Pemulihan Blackout</h3>
        <div class="flex items-center gap-2">
            <select id="blackout-threshold" class="px-3 py-2 bg-[#050505] border border-neutral-700 rounded-lg text-sm text-neutral-200 focus:outline-none">
                <option value="2">2 Menit</option>
                <option value="5">5 Menit</option>
                <option value="15">15 Menit</option>
                <option value="60" selected>60 Menit</option>
            </select>
            <button onclick="Blackout.deteksi()"
                class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-white text-xs lg:text-base font-bold rounded transition-colors">Deteksi Blackout</button>
        </div>
    </div>
    <div class="flex flex-wrap items-center gap-3">
        <select id="blackout-date-picker"
            class="px-3 py-2 bg-[#050505] border border-neutral-700 rounded-lg text-sm text-neutral-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/20 transition-all"></select>
        
        <select id="blackout-type-filter" onchange="Blackout.applyFilters()"
            class="px-3 py-2 bg-[#050505] border border-neutral-700 rounded-lg text-sm text-neutral-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/20 transition-all">
            <option value="all">Semua Tipe</option>
            <option value="member">Member</option>
            <option value="guest">Guest</option>
        </select>
        
        <select id="blackout-group-filter" onchange="Blackout.applyFilters()"
            class="px-3 py-2 bg-[#050505] border border-neutral-700 rounded-lg text-sm text-neutral-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/20 transition-all">
            <option value="all">Semua Grup</option>
        </select>

        <button onclick="Blackout.loadList(document.getElementById('blackout-date-picker').value)"
            class="px-4 py-2 text-sm font-medium text-black bg-emerald-500 hover:bg-emerald-400 rounded-lg transition-colors">Tampilkan</button>
        <button onclick="Blackout.load()"
            class="px-4 py-2 bg-[#171717] border border-neutral-700 hover:bg-[#222] text-neutral-300 text-xs lg:text-base font-bold rounded transition-colors">↻ Refresh</button>
    </div>
    <div id="blackout-list"
        class="bg-[#0c0c0c] border border-neutral-800 rounded p-6 text-neutral-400 text-center text-xs lg:text-base">Klik "Deteksi Blackout" untuk mulai scan.</div>
</div>
