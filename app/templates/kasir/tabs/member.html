<!-- ===== TAB: MEMBER ===== -->
<div id="tab-member" class="tab-content hidden space-y-6">
    <!-- Member Action Header -->
    <div class="bg-[#111] border border-[#1f1f1f] rounded-xl p-5">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
                <h3 class="text-sm lg:text-[22px] font-bold text-neutral-100 tracking-wide">Member</h3>
                <p class="text-[10px] lg:text-base text-neutral-500 mt-0.5">Kelola akun member — daftarkan, isi saldo, lihat riwayat transaksi</p>
            </div>
            <button onclick="Member.showAddModal()"
                class="px-4 py-2.5 bg-neutral-100 hover:bg-white text-black text-xs lg:text-base font-bold rounded-lg transition-colors flex items-center gap-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Tambah Member
            </button>
        </div>
    </div>

    <div class="bg-[#111] border border-[#1f1f1f] rounded-xl p-5">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
            <h3 class="text-xs lg:text-[22px] font-bold text-neutral-400 uppercase tracking-wider">Daftar Member</h3>
            <div class="flex flex-wrap items-center gap-2">
                <input type="text" id="member-search-input" placeholder="Cari username..."
                    class="px-3 py-2 bg-[#0a0a0a] border border-[#2a2a2a] rounded-lg text-xs lg:text-base text-neutral-200 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 w-40"
                    oninput="Member.debouncedSearch()"
                    onkeypress="if(event.key === 'Enter') Member.doSearch()">
                <select id="member-grup-filter-select"
                    class="px-3 py-2 bg-[#0a0a0a] border border-[#2a2a2a] rounded-lg text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500"
                    onchange="Member.doSearch()">
                    <option value="">Semua Grup</option>
                </select>
                <button onclick="Member.doSearch()"
                    class="px-4 py-2 bg-neutral-100 hover:bg-white text-black text-xs lg:text-base font-bold rounded-lg transition-colors">Cari</button>
                <button onclick="Member.clearSearch()"
                    class="px-4 py-2 bg-[#1a1a1a] border border-[#2a2a2a] hover:bg-[#222] text-neutral-300 text-xs lg:text-base font-bold rounded-lg transition-colors">Reset</button>
            </div>
        </div>
        <div id="member-table" class="overflow-x-hidden w-full">
            <div class="flex justify-center py-10">
                <div class="w-6 h-6 border-2 border-[#2a2a2a] border-t-neutral-100 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>
