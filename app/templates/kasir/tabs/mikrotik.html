<!-- ==================== TAB: MIKROTIK ==================== -->
<div id="tab-mikrotik" class="tab-content hidden space-y-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h2 class="text-xl lg:text-2xl font-bold text-neutral-200">🌐 MikroTik Hotspot</h2>
            <p class="text-xs lg:text-sm text-neutral-500 mt-1">Konfigurasi integrasi dengan RouterOS MikroTik</p>
        </div>
    </div>

    <div class="bg-[#0c0c0c] border border-[#1c1c1c] rounded p-6 space-y-6">
        <div class="flex items-center justify-between border-b border-[#1c1c1c] pb-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded bg-[#171717] border border-[#262626] flex items-center justify-center">
                    <span class="text-xl">🌐</span>
                </div>
                <div>
                    <h3 class="text-xs lg:text-[22px] font-bold text-neutral-200 uppercase tracking-wider">Status Integrasi</h3>
                    <p class="text-[9px] lg:text-base text-neutral-500 mt-1">Sinkronisasi otomatis member billing ke MikroTik Hotspot Users</p>
                </div>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="mikrotik-enabled" class="sr-only peer" onchange="MikrotikModule.toggleIntegration(this)">
                <div class="w-14 h-7 bg-[#262626] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-neutral-200"></div>
            </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-[10px] lg:text-xs text-neutral-500 uppercase font-semibold">IP Address (Host API)</label>
                <input type="text" id="mikrotik-host" class="w-full px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500" placeholder="192.168.1.1">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] lg:text-xs text-neutral-500 uppercase font-semibold">Port API</label>
                <input type="text" id="mikrotik-port" class="w-full px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500" placeholder="8728">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] lg:text-xs text-neutral-500 uppercase font-semibold">Username API</label>
                <input type="text" id="mikrotik-username" class="w-full px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500" placeholder="admin">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] lg:text-xs text-neutral-500 uppercase font-semibold">Password API</label>
                <input type="password" id="mikrotik-password" class="w-full px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500" placeholder="Kosongkan jika tidak ada">
            </div>
            <div class="space-y-2 md:col-span-2">
                <label class="text-[10px] lg:text-xs text-neutral-500 uppercase font-semibold">Hotspot Profile Default</label>
                <input type="text" id="mikrotik-profile" class="w-full px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500" placeholder="default">
                <p class="text-[9px] text-neutral-500 mt-1">Profile yang akan diberikan saat akun baru dibuat (Pastikan ada di IP > Hotspot > User Profiles)</p>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-center mt-6 pt-4 border-t border-[#1c1c1c] gap-4">
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="btn-mikrotik-test" onclick="MikrotikModule.testConnection()" class="flex-1 sm:flex-none px-4 py-2 bg-[#171717] hover:bg-[#222] border border-[#262626] text-neutral-300 text-xs lg:text-base font-semibold rounded transition-colors">Test Koneksi</button>
                <button id="btn-mikrotik-sync" onclick="MikrotikModule.syncAllMembers()" class="flex-1 sm:flex-none px-4 py-2 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 text-xs lg:text-base font-semibold rounded transition-colors">Selaraskan Semua Member</button>
            </div>
            <button onclick="MikrotikModule.saveConfig()" class="w-full sm:w-auto px-6 py-2 bg-neutral-100 hover:bg-neutral-200 text-black text-xs lg:text-base font-bold rounded transition-colors">Simpan Pengaturan</button>
        </div>
    </div>
</div>
