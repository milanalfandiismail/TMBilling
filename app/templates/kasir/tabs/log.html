<!-- ===== TAB: LOG ===== -->
<div id="tab-log" class="tab-content hidden">
    <div class="bg-[#0c0c0c] border border-[#1c1c1c] rounded p-6">
        <div class="flex flex-wrap gap-3 mb-4">
            <select id="filter-kategori-log" onchange="Log.filter()"
                class="px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs text-neutral-200 focus:outline-none focus:border-neutral-500">
                <option value="Semua">Semua Kategori</option>
                <option value="Sistem">System & Error</option>
                <option value="Transaksi">Transaksi & Struk</option>
                <option value="Sesi">Sesi & Billing</option>
                <option value="Blackout">Blackout</option>
            </select>
            <input type="text" id="filter-log" placeholder="Cari log..."
                class="flex-1 px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs text-neutral-200 placeholder-neutral-600 focus:outline-none focus:border-neutral-500">
            <button onclick="Log.filter()"
                class="px-4 py-2 bg-neutral-100 hover:bg-neutral-200 text-black text-xs font-bold rounded transition-colors">Cari</button>
            <button onclick="Log.clear()"
                class="px-4 py-2 bg-[#1a0a0c] border border-[#ef4444]/30 hover:bg-red-600 hover:text-white text-red-400 text-xs font-bold rounded transition-colors">Bersihkan</button>
            <button onclick="Log.exportLogs()"
                class="px-4 py-2 bg-[#171717] border border-[#262626] hover:bg-[#222] text-neutral-300 text-xs font-bold rounded transition-colors">Export</button>
        </div>
        <div id="log-content"
            class="bg-[#050505] border border-[#1c1c1c] rounded text-xs max-h-[600px] overflow-auto scrollbar-mono p-4">
            <div class="flex justify-center py-10">
                <div class="w-6 h-6 border-2 border-[#1c1c1c] border-t-neutral-100 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>
