<!-- ===== TAB: LAPORAN KANTIN / F&B ===== -->
<div id="tab-laporan_menu" class="tab-content hidden">
    <div class="bg-[#0c0c0c] border border-neutral-800 rounded-xl p-5">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
            <h3 class="text-sm font-semibold text-neutral-100">Laporan Omzet Kantin / F&B</h3>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto justify-end">
                <select id="laporan-menu-kasir-select" onchange="LaporanMenu.filter()"
                    class="flex-1 sm:flex-initial px-3 py-2 bg-[#050505] border border-neutral-700 rounded-lg text-sm text-neutral-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/20 transition-all">
                    <option value="">Semua Kasir</option>
                </select>
                <select id="laporan-menu-tanggal-select"
                    class="flex-1 sm:flex-initial px-3 py-2 bg-[#050505] border border-neutral-700 rounded-lg text-sm text-neutral-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/20 transition-all">
                    <option value="">Pilih Tanggal</option>
                </select>
                <button onclick="LaporanMenu.filter()"
                    class="w-full sm:w-auto px-4 py-2 text-sm font-medium text-black bg-emerald-500 hover:bg-emerald-400 rounded-lg transition-colors">Tampilkan</button>
                <button onclick="LaporanMenu.exportPDF()"
                    class="w-full sm:w-auto px-4 py-2 text-sm font-medium text-white bg-red-700 hover:bg-red-600 rounded-lg transition-colors">Export PDF</button>
            </div>
        </div>
        <div id="laporan-menu-area">
            <div class="flex justify-center py-10">
                <div class="w-6 h-6 border-2 border-neutral-800 border-t-neutral-100 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>
