<!-- ===== TAB: LAPORAN KANTIN / F&B ===== -->
<div id="tab-laporan_menu" class="tab-content hidden">
    <div class="bg-[#0c0c0c] border border-[#1c1c1c] rounded p-6">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
            <h3 class="text-xs lg:text-[22px] font-bold text-neutral-200 uppercase tracking-wider">Laporan Omzet Kantin / F&B</h3>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto justify-end">
                <select id="laporan-menu-kasir-select" onchange="LaporanMenu.filter()"
                    class="flex-1 sm:flex-initial px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500">
                    <option value="">Semua Kasir</option>
                </select>
                <select id="laporan-menu-metode-pembayaran-select" onchange="LaporanMenu.filter()"
                    class="flex-1 sm:flex-initial px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500">
                    <option value="">Semua Metode</option>
                </select>
                <select id="laporan-menu-tanggal-select" onchange="LaporanMenu.filter()"
                    class="flex-1 sm:flex-initial px-3 py-2 bg-[#050505] border border-[#1c1c1c] rounded text-xs lg:text-base text-neutral-200 focus:outline-none focus:border-neutral-500">
                    <option value="">Pilih Tanggal</option>
                </select>
                <button onclick="LaporanMenu.exportPDF()"
                    class="w-full sm:w-auto px-4 py-2 bg-rose-700 hover:bg-rose-600 text-white text-xs lg:text-base font-bold rounded transition-colors">Export PDF</button>
            </div>
        </div>
        <div id="laporan-menu-area">
            <div class="flex justify-center py-10">
                <div class="w-6 h-6 border-2 border-[#1c1c1c] border-t-neutral-100 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>
