<!-- ===== TAB: HARDWARE CHECKER ===== -->
<div id="tab-hardware_checker" class="tab-content hidden space-y-6">
    <div class="bg-[#0c0c0c] border border-[#1c1c1c] rounded-xl p-6 shadow-xl">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
            <div>
                <h3 class="text-lg lg:text-2xl font-bold text-neutral-100 flex items-center gap-2">
                    <span>🛡️</span> Hardware Checker & Security Audit
                </h3>
                <p class="text-xs text-neutral-500 mt-1">Pemeriksaan serial number komponen PC client secara otomatis (Always-On) untuk mendeteksi pencurian atau penukaran RAM, GPU, SSD.</p>
            </div>
            <button onclick="HardwareChecker.load()"
                class="px-4 py-2 bg-[#171717] border border-[#262626] hover:bg-[#222] text-neutral-300 text-xs lg:text-sm font-bold rounded-lg transition-colors flex items-center gap-1.5 self-start sm:self-center">
                <span>↻</span> Refresh Status
            </button>
        </div>

        <!-- Detail Grid/Tabel PC Hardware Checker -->
        <div id="hardware-checker-container" class="space-y-4">
            <div class="flex justify-center py-10">
                <div class="w-8 h-8 border-2 border-[#1c1c1c] border-t-neutral-100 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>
