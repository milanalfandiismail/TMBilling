<!-- ===== TAB: DASHBOARD ===== -->
<div id="tab-dash" class="tab-content">
    <!-- ===== ROW STATS (BRIGHTER) ===== -->
    <div id="dashboard-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <!-- Stat: Sesi Aktif -->
        <div class="bg-[#181818] border border-[#282828] rounded-xl p-4 flex flex-col justify-between h-20 border-l-2 border-l-neutral-400">
            <span class="text-[9px] text-neutral-400 uppercase font-bold tracking-wider">Sesi Aktif</span>
            <div class="flex items-baseline justify-between">
                <span id="stat-active" class="text-2xl font-black text-neutral-100 font-mono">0</span>
                <span class="text-[9px] text-neutral-500">unit aktif</span>
            </div>
        </div>
        <!-- Stat: PC Tersedia -->
        <div class="bg-[#181818] border border-[#282828] rounded-xl p-4 flex flex-col justify-between h-20 border-l-2 border-l-neutral-500">
            <span class="text-[9px] text-neutral-400 uppercase font-bold tracking-wider">PC Tersedia</span>
            <div class="flex items-baseline justify-between">
                <span id="stat-available" class="text-2xl font-black text-neutral-100 font-mono">0</span>
                <span class="text-[9px] text-neutral-500">unit kosong</span>
            </div>
        </div>
        <!-- Stat: PC Terputus / No Heartbeat -->
        <div class="bg-[#181818] border border-[#282828] rounded-xl p-4 flex flex-col justify-between h-20 border-l-2 border-l-red-700">
            <span class="text-[9px] text-neutral-400 uppercase font-bold tracking-wider">Koneksi Terputus</span>
            <div class="flex items-baseline justify-between">
                <span id="stat-disconnected" class="text-2xl font-black text-neutral-100 font-mono">0</span>
                <span class="text-[9px] text-neutral-500">masalah</span>
            </div>
        </div>
        <!-- Stat: Omzet Hari Ini -->
        <div class="bg-[#181818] border border-[#282828] rounded-xl p-4 flex flex-col justify-between h-20 border-l-2 border-l-neutral-300">
            <span class="text-[9px] text-neutral-400 uppercase font-bold tracking-wider">Omzet Hari Ini</span>
            <div class="flex items-baseline justify-between">
                <span id="stat-income" class="text-base font-black text-neutral-100 font-mono">Rp 0</span>
                <span class="text-[9px] text-neutral-500">tunai</span>
            </div>
        </div>
    </div>

    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div id="dashboard-tabs" class="flex flex-wrap gap-2"></div>
        <button onclick="Blackout.forceAllAndDetect()"
            class="px-4 py-2 bg-[#1a1a1a] border border-[#2a2a2a] hover:bg-[#222] hover:border-neutral-500 text-neutral-300 text-xs font-semibold rounded-lg transition-colors">
            Cek Mati Lampu
        </button>
    </div>
    <div id="pc-area">
        <div class="flex items-center justify-center py-20">
            <div class="w-6 h-6 border-2 border-[#2a2a2a] border-t-neutral-100 rounded-full animate-spin"></div>
        </div>
    </div>
</div>
