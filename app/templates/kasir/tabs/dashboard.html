<!-- ===== TAB: DASHBOARD ===== -->
<div id="tab-dash" class="tab-content">
    <!-- ===== ROW STATS (BRIGHTER) ===== -->
    <div id="dashboard-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <!-- Stat: Sesi Aktif -->
        <div
            class="bg-[#181818] border border-[#282828] rounded-xl p-4 lg:p-5 flex flex-col justify-between min-h-24 lg:min-h-28 border-l-2 border-l-neutral-400">
            <span class="text-[10px] lg:text-sm text-neutral-400 uppercase font-bold tracking-wider">Sesi Aktif</span>
            <div class="flex items-baseline justify-between">
                <span id="stat-active" class="text-2xl lg:text-3xl font-black text-neutral-100 font-mono">0</span>
                <span class="text-[10px] lg:text-xs text-neutral-500">unit aktif</span>
            </div>
        </div>
        <!-- Stat: PC Tersedia -->
        <div
            class="bg-[#181818] border border-[#282828] rounded-xl p-4 lg:p-5 flex flex-col justify-between min-h-24 lg:min-h-28 border-l-2 border-l-neutral-500">
            <span class="text-[10px] lg:text-sm text-neutral-400 uppercase font-bold tracking-wider">PC Tersedia</span>
            <div class="flex items-baseline justify-between">
                <span id="stat-available" class="text-2xl lg:text-3xl font-black text-neutral-100 font-mono">0</span>
                <span class="text-[10px] lg:text-xs text-neutral-500">unit kosong</span>
            </div>
        </div>
        <!-- Stat: PC Terputus / No Heartbeat -->
        <div
            class="bg-[#181818] border border-[#282828] rounded-xl p-4 lg:p-5 flex flex-col justify-between min-h-24 lg:min-h-28 border-l-2 border-l-red-700">
            <span class="text-[10px] lg:text-sm text-neutral-400 uppercase font-bold tracking-wider">Koneksi
                Terputus</span>
            <div class="flex items-baseline justify-between">
                <span id="stat-disconnected" class="text-2xl lg:text-3xl font-black text-neutral-100 font-mono">0</span>
                <span class="text-[10px] lg:text-xs text-neutral-500">masalah</span>
            </div>
        </div>
        <!-- Stat: Omzet Hari Ini -->
        <div
            class="bg-[#181818] border border-[#282828] rounded-xl p-4 lg:p-5 flex flex-col justify-between min-h-24 lg:min-h-28 border-l-2 border-l-neutral-300">
            <span class="text-[10px] lg:text-sm text-neutral-400 uppercase font-bold tracking-wider">Omzet Hari
                Ini</span>
            <div class="flex items-baseline justify-between">
                <span id="stat-income" class="text-lg lg:text-2xl font-black text-neutral-100 font-mono">Rp 0</span>
                <span class="text-[10px] lg:text-xs text-neutral-500">tunai</span>
            </div>
        </div>
    </div>

    <div class="flex flex-wrap items-center justify-between gap-3 mb-4 mt-2">
        <div id="dashboard-tabs" class="flex flex-wrap gap-2"></div>
        <div class="flex gap-2">
            <button onclick="Dashboard.tambahWaktuMember()"
                class="px-4 py-2 bg-neutral-100 hover:bg-white text-black text-xs font-bold rounded-lg transition-colors flex items-center gap-2">
                + Tambah Waktu Member
            </button>
            <button onclick="Member.showAddModal()"
                class="px-4 py-2 bg-[#1a1a1a] border border-[#2a2a2a] hover:bg-[#222] hover:border-neutral-500 text-neutral-300 text-xs font-semibold rounded-lg transition-colors flex items-center gap-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Tambah Member
            </button>
        </div>
    </div>
    <div id="pc-area">
        <div class="flex items-center justify-center py-20">
            <div class="w-6 h-6 border-2 border-[#2a2a2a] border-t-neutral-100 rounded-full animate-spin"></div>
        </div>
    </div>
</div>
