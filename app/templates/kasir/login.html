<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {{ warnet_title }}</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4 font-inter">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600 mb-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-100">{{ warnet_title }}</h1>
            <p class="text-slate-500 text-xs mt-1">Management Studio</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8">
            <h2 class="text-base font-semibold text-slate-200 mb-6 text-center">Masuk ke akun Anda</h2>

            <div id="error-box" class="hidden mb-5 p-3 bg-red-500/10 border border-red-500/20 rounded-xl flex items-start gap-2">
                <svg class="w-4 h-4 text-red-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span id="error-text" class="text-xs text-red-400"></span>
            </div>

            <form onsubmit="doLogin(event)" class="space-y-5">
                <div>
                    <label class="text-xs font-semibold text-slate-400 mb-1.5 block">Username</label>
                    <input type="text" id="username" placeholder="Masukkan username" required
                        class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-400 mb-1.5 block">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required
                        class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                </div>
                <button type="submit" id="btn-login"
                    class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-semibold text-sm transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btn-text">Masuk</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                    </svg>
                </button>
            </form>
        </div>

        <p class="text-center text-slate-600 text-xs mt-6">TMBilling v1.0</p>
    </div>

    <script>
        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-text');
            const errorBox = document.getElementById('error-box');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

            if (!username || !password) {
                showError('Username dan password wajib diisi');
                return;
            }

            btn.disabled = true;
            btnText.innerText = 'Memverifikasi...';
            errorBox.classList.add('hidden');

            try {
                const res = await fetch('/api/kasir/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    btnText.innerText = 'Berhasil';
                    btn.classList.replace('bg-indigo-600', 'bg-emerald-600');
                    setTimeout(() => { window.location.href = '/kasir/'; }, 500);
                } else {
                    showError(data.error || 'Username atau password salah');
                    btnText.innerText = 'Masuk';
                    btn.disabled = false;
                }
            } catch (err) {
                showError('Gagal terhubung ke server');
                btnText.innerText = 'Masuk';
                btn.disabled = false;
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-box');
            const errorText = document.getElementById('error-text');
            errorText.innerText = msg;
            errorBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
