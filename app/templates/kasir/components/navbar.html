<!-- ===== HEADER/NAVBAR ===== -->
<header
    class="h-14 bg-[#0a0a0a] border-b border-[#171717] flex items-center justify-between px-4 md:px-6 sticky top-0 z-20 shrink-0">
    <div class="flex items-center gap-3">
        <button id="navbar-toggle-btn" onclick="Dashboard.toggleSidebar()"
            class="p-1.5 rounded hover:bg-neutral-900 transition-colors text-neutral-400 hover:text-neutral-200 flex items-center justify-center lg:hidden"
            title="Tampilkan Sidebar">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
        <h2 id="page-title" class="text-sm font-bold text-neutral-100 tracking-wide">Dashboard</h2>
    </div>
    <div class="flex items-center gap-4">
        <div class="text-right hidden sm:block">
            <div class="text-xs font-semibold text-neutral-200 font-mono" id="current-time">--:--</div>
            <div class="text-[9px] text-neutral-500 font-mono" id="current-date">--/--/----</div>
        </div>
    </div>
</header>
