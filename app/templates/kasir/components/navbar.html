<!-- ============================================================
     Header/Navbar — Mintlify Dark
     ============================================================ -->
<header
    class="h-14 bg-[#0a0a0a] border-b border-neutral-800 flex items-center justify-between px-4 md:px-6 sticky top-0 z-20 shrink-0">
    <div class="flex items-center gap-3">
        <button id="navbar-toggle-btn" onclick="Dashboard.toggleSidebar()"
            class="p-1.5 rounded-lg hover:bg-neutral-800 transition-colors text-neutral-500 hover:text-neutral-200 flex items-center justify-center lg:hidden"
            title="Tampilkan Sidebar">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
        <h2 id="page-title" class="text-sm font-semibold text-neutral-100 tracking-tight">Dashboard</h2>
    </div>
    <div class="flex items-center gap-4">
        <div class="text-right hidden sm:block" data-timezone="{{ user_timezone }}" data-timezone-label="{{ user_timezone_label }}">
            <div class="text-sm font-medium text-neutral-200 font-mono" id="current-time">--:--</div>
            <div class="text-xs text-neutral-500 font-mono" id="current-date">--/--/----</div>
        </div>
        <div class="w-px h-6 bg-neutral-800 hidden sm:block"></div>
        <div class="hidden sm:flex items-center gap-2">
            <div class="w-7 h-7 rounded-lg bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
            </div>
            <span class="text-xs text-neutral-500 font-medium">Online</span>
        </div>
    </div>
</header>
