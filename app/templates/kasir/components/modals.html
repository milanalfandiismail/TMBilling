<!-- ===== MODAL: STRUK ===== -->
<div id="modalStruk" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
    <div class="bg-[#0c0c0c] border border-[#1c1c1c] rounded w-full max-w-sm overflow-hidden animate-in">
        <div id="printArea" class="p-6 text-neutral-200 text-xs">
            <div class="text-center border-b border-dashed border-[#1c1c1c] pb-4 mb-4">
                <h2 class="text-sm font-bold text-neutral-100 uppercase tracking-wider">MILAN NET</h2>
                <p class="text-[9px] text-neutral-500 mt-1">Software Engineering Lab</p>
            </div>
            <div id="isiStruk" class="space-y-2"></div>
            <div
                class="mt-6 pt-4 border-t border-dashed border-[#1c1c1c] text-center text-[10px] text-neutral-500">
                Terima kasih</div>
        </div>
        <div class="flex border-t border-[#1c1c1c] p-4 gap-3">
            <button onclick="closeStruk()"
                class="flex-1 py-2 bg-[#171717] border border-[#262626] hover:bg-[#222] text-neutral-400 text-xs font-bold rounded transition-colors">Tutup</button>
            <button onclick="printStrukNow()"
                class="flex-1 py-2 bg-neutral-100 hover:bg-neutral-200 text-black text-xs font-bold rounded transition-colors">Cetak</button>
        </div>
    </div>
</div>

<!-- ===== MODAL: BACKUP ===== -->
<div id="modal-backup" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
    <div class="bg-[#0c0c0c] border border-[#1c1c1c] rounded p-6 max-w-md w-full animate-in">
        <div class="flex items-center justify-between mb-4 pb-4 border-b border-[#1c1c1c]">
            <h3 class="text-xs font-bold text-neutral-200 uppercase tracking-wider">Pilih Metode Backup</h3>
            <button onclick="Settings.closeBackupModal()"
                class="text-neutral-500 hover:text-slate-300 text-xl leading-none">&times;</button>
        </div>
        <div class="space-y-3">
            <button onclick="Settings.runServerBackup()"
                class="w-full p-4 bg-[#050505] hover:bg-[#121212] border border-[#1c1c1c] rounded text-left transition-colors">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-[#171717] border border-[#262626] text-neutral-300 rounded flex items-center justify-center font-mono font-bold">
                        SV</div>
                    <div>
                        <div class="text-xs font-bold text-neutral-200 uppercase">Backup ke Server</div>
                        <div class="text-[10px] text-neutral-500 mt-0.5">Simpan di folder server</div>
                    </div>
                </div>
            </button>
            <button onclick="Settings.runLocalBackup()"
                class="w-full p-4 bg-[#050505] hover:bg-[#121212] border border-[#1c1c1c] rounded text-left transition-colors">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-[#171717] border border-[#262626] text-neutral-300 rounded flex items-center justify-center font-mono font-bold">
                        DL</div>
                    <div>
                        <div class="text-xs font-bold text-neutral-200 uppercase">Unduh Database</div>
                        <div class="text-[10px] text-neutral-500 mt-0.5">Download file database</div>
                    </div>
                </div>
            </button>
        </div>
    </div>
</div>
