<!-- ===== SIDEBAR ===== -->
<aside id="sidebar"
    class="fixed lg:relative top-0 left-0 z-40 w-64 h-screen bg-[#0a0a0a] border-r border-[#171717] flex flex-col transition-transform duration-300 -translate-x-full lg:translate-x-0 shrink-0">
    <div class="flex items-center justify-between px-4 h-14 border-b border-[#171717] shrink-0">
        <div class="flex items-center gap-2.5 min-w-0">
            <div class="w-8 h-8 rounded-lg bg-neutral-100 flex items-center justify-center shrink-0">
                <span class="text-[#050505] font-black text-sm">TM</span>
            </div>
            <div class="min-w-0">
                <h1 class="text-base font-extrabold text-neutral-100 leading-none truncate w-full" title="{{ warnet_title }}">{{ warnet_title }}</h1>
                <p class="text-[10px] text-neutral-500 leading-tight mt-0.5">Kasir Panel</p>
            </div>
        </div>
        <button id="sidebar-toggle-btn" onclick="Dashboard.toggleSidebar()"
            class="p-1 rounded hover:bg-neutral-900 text-neutral-400 hover:text-neutral-200 transition-colors"
            title="Sembunyikan Sidebar">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
            </svg>
        </button>
    </div>

    <nav class="flex-1 overflow-y-auto scrollbar-thin px-3 py-4 space-y-1.5">
        <div class="text-[9px] font-bold text-neutral-600 uppercase tracking-widest px-3 py-1">Operasional</div>

        <button onclick="App.switchTab('dash')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                </path>
            </svg>
            <span>Dashboard</span>
        </button>
        <button onclick="App.switchTab('menu')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M6 5c0-1.1.9-2 2-2h8a2 2 0 012 2v10a4 4 0 01-4 4H10a4 4 0 01-4-4V5zM6 9h12M9 13h6"></path>
            </svg>
            <span>Kantin / POS F&B</span>
        </button>
        <button onclick="App.switchTab('struk')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                </path>
            </svg>
            <span>Riwayat & Struk</span>
        </button>
        <button onclick="App.switchTab('tournament')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <span>Turnamen</span>
        </button>

        <div class="text-[9px] font-bold text-neutral-600 uppercase tracking-widest px-3 py-1 pt-3">Data Master</div>
        <button onclick="App.switchTab('member')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            <span>Member</span>
        </button>
        <button onclick="App.switchTab('paket')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
            </svg>
            <span>Paket Billing</span>
        </button>
        <button onclick="App.switchTab('pc')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M9.75 17L9 21h6l-.75-4M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                </path>
            </svg>
            <span>Unit PC</span>
        </button>
        <button onclick="App.switchTab('grup')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                </path>
            </svg>
            <span>Grup PC / Zona</span>
        </button>

        <div class="text-[9px] font-bold text-neutral-600 uppercase tracking-widest px-3 py-1 pt-3">Sistem & Laporan</div>
        <button onclick="App.switchTab('monitor')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z">
                </path>
            </svg>
            <span>Hardware Monitor</span>
        </button>
        <button onclick="App.switchTab('blackout')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
            <span>Blackout Recovery</span>
        </button>
        <button onclick="App.switchTab('laporan')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z">
                </path>
            </svg>
            <span>Laporan Omzet Billing</span>
        </button>
        <button onclick="App.switchTab('laporan_menu')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z M13 17h-2M15 11v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v7h12"></path>
            </svg>
            <span>Laporan Omzet Kantin</span>
        </button>
        <button onclick="App.switchTab('user')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2m8-10a4 4 0 100-8 4 4 0 000 8zm6 3a2 2 0 110-4 2 2 0 010 4zm-2 10a4 4 0 00-8 0v2h8v-2z">
                </path>
            </svg>
            <span>Kelola User / Kasir</span>
        </button>
        <button onclick="App.switchTab('log')"
            class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                </path>
            </svg>
            <span>Log Sistem</span>
        </button>
        <!-- Parent Menu Pengaturan -->
        <div class="space-y-1">
            <button onclick="Settings.toggleSubmenu(); App.switchTab('settings');"
                class="nav-item w-full flex items-center justify-between px-3 py-2 rounded text-sm text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
                <div class="flex items-center gap-3">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <span>Pengaturan</span>
                </div>
                <svg id="settings-arrow" class="w-3 h-3 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
            <div id="settings-submenu" class="hidden pl-7 space-y-1">
                <button onclick="App.switchTab('settings'); Settings.switchSubTab('general');" id="subnav-general"
                    class="subnav-item w-full flex items-center gap-2.5 px-3 py-1.5 rounded text-xs text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
                    ⚙️ Umum & Kiosk
                </button>
                <button onclick="App.switchTab('settings'); Settings.switchSubTab('backup');" id="subnav-backup"
                    class="subnav-item w-full flex items-center gap-2.5 px-3 py-1.5 rounded text-xs text-neutral-400 hover:text-neutral-100 hover:bg-[#121212] transition-all text-left">
                    💾 Database & Backup
                </button>
            </div>
        </div>
    </nav>

    <div class="border-t border-[#171717] p-4 shrink-0 bg-[#080808]">
        <div id="user-info" class="flex items-center gap-3 mb-3">
            <div
                class="w-9 h-9 rounded bg-neutral-800 border border-[#262626] flex items-center justify-center text-sm font-bold text-neutral-200 shrink-0">
                {{ (session.kasir_nama or session.kasir_username or 'K')[0] | upper }}
            </div>
            <div class="min-w-0 flex-1">
                <div class="text-sm font-semibold text-neutral-200 lg:truncate break-words whitespace-normal">{{ session.kasir_nama or
                    session.kasir_username }}</div>
                <div class="text-[10px] text-neutral-400 font-medium flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-neutral-400"></span>
                    Online
                </div>
            </div>
        </div>
        <button onclick="App.logout()"
            class="w-full flex items-center justify-center gap-2 py-2 rounded bg-[#0c0c0c] border border-[#1c1c1c] text-xs font-semibold text-neutral-400 hover:text-white hover:border-neutral-400 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                </path>
            </svg>
            Keluar
        </button>
    </div>
</aside>
