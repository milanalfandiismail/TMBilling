<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ warnet_title }} - Kasir{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        [x-cloak] {
            display: none !important;
        }

        /* Sleek Chamber Noir Scrollbars */
        .scrollbar-thin::-webkit-scrollbar,
        .scrollbar-mono::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        .scrollbar-thin::-webkit-scrollbar-track,
        .scrollbar-mono::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb,
        .scrollbar-mono::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 2px;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb:hover,
        .scrollbar-mono::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }

        /* Refined Eye-Friendly Monochromatic Input Overrides */
        input[type="text"],
        input[type="number"],
        input[type="password"],
        input[type="email"],
        select {
            background-color: #0a0a0a !important;
            border-color: #2a2a2a !important;
            color: #e5e5e5 !important;
            border-width: 1px !important;
            border-style: solid !important;
            border-radius: 6px !important;
            transition: border-color 0.15s ease-in-out !important;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        select:focus {
            border-color: #555 !important;
            outline: none !important;
        }

        /* Card hover transitions */
        .hover-card-trigger {
            transition: background-color 0.15s ease-in-out, border-color 0.15s ease-in-out;
        }

        /* Modal open animation */
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.96) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .fixed.inset-0 > div {
            animation: modal-in 0.18s ease-out;
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body class="bg-[#050505] text-neutral-200 font-space-grotesk antialiased flex h-[100dvh] lg:h-screen w-screen overflow-hidden" data-kasir-role="{{ session.get('kasir_role', '') }}">
