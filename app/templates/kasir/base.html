<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }

        /* Mintlify-style scrollbars — dark */
        .scrollbar-thin::-webkit-scrollbar,
        .scrollbar-mono::-webkit-scrollbar { width: 5px; height: 5px; }
        .scrollbar-thin::-webkit-scrollbar-track,
        .scrollbar-mono::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb,
        .scrollbar-mono::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover,
        .scrollbar-mono::-webkit-scrollbar-thumb:hover { background: #525252; }

        /* Mintlify-style form inputs — dark mode */
        input[type="text"],
        input[type="number"],
        input[type="password"],
        input[type="email"],
        select {
            background-color: #050505 !important;
            border-color: #333333 !important;
            color: #e5e5e5 !important;
            border-width: 1px !important;
            border-style: solid !important;
            border-radius: 8px !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
            transition: border-color 0.15s ease, box-shadow 0.15s ease !important;
        }
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        select:focus {
            border-color: #00d4a4 !important;
            box-shadow: 0 0 0 3px rgba(0, 212, 164, 0.15) !important;
            outline: none !important;
        }

        /* Card hover transitions */
        .hover-card-trigger {
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }

        /* Modal open animation */
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.96) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .fixed.inset-0 > div {
            animation: modal-in 0.18s ease-out;
        }

        /* Toast animation */
        @keyframes toast-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toast-out {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .toast-enter { animation: toast-in 0.3s ease; }
        .toast-exit { animation: toast-out 0.3s ease; }

        /* Global font smoothing */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .font-mono, [class*="font-mono"] {
            font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace !important;
        }
    </style>
    {% block head %}{% endblock %}
</head>
