<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMBilling Client</title>

    <!-- External Assets -->
    <script src="js/tailwindcss.js"></script>
    <link rel="stylesheet" href="css/main.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#34d399', // Emerald accent to match Cashier app status
                        dark: '#050505',
                        card: '#111111',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-transparent" oncontextmenu="return false">

    <!-- 1. LAYAR LOGIN (MODE KIOSK) -->
    <div id="login-screen" class="w-full h-full flex items-center justify-center p-6 lg:p-12">
        <h1 class="fixed top-10 left-10 text-3xl font-black uppercase opacity-10 tracking-tighter">TMBilling</h1>
        
        <!-- Grid Container for Side-by-side Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-5xl w-full items-stretch justify-center">
            
            <!-- Left Card: Login Form -->
            <div class="bg-card border border-[#2a2a2a] rounded-2xl p-8 lg:p-10 shadow-2xl flex flex-col justify-between">
                <header class="mb-8 space-y-1">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></div>
                        <span class="text-[9px] font-bold tracking-widest text-accent uppercase">Terkunci</span>
                    </div>
                    <h2 class="text-2xl lg:text-3xl font-extrabold tracking-tight">Nama PC : <span class="text-accent pc-name-display">PC-01</span></h2>
                </header>

                <div class="space-y-4 flex-1 flex flex-col justify-center">
                    <input type="text" id="username" placeholder="Username"
                        class="w-full bg-white/5 border border-[#2a2a2a] rounded-xl px-5 py-3.5 text-sm outline-none focus:border-neutral-400 focus:bg-white/10 transition-colors">
                    <input type="password" id="password" placeholder="Password"
                        class="w-full bg-white/5 border border-[#2a2a2a] rounded-xl px-5 py-3.5 text-sm outline-none focus:border-neutral-400 focus:bg-white/10 transition-colors">
                    <button id="login-btn"
                        class="w-full bg-white hover:bg-neutral-200 text-black rounded-xl py-3.5 mt-4 font-bold text-xs tracking-wider transition-all">Mulai Sesi</button>
                </div>

                <footer class="mt-8 pt-6 border-t border-white/5 flex justify-between items-end text-neutral-500 font-mono text-[9px]">
                    <div class="space-y-1">
                        <p>IP Address: <span id="ip-display">Memuat...</span></p>
                        <p>Mac Address: <span id="mac-display">Memuat...</span></p>
                    </div>
                    <div class="text-right text-accent font-bold">
                        <p id="shutdown-status" class="tracking-wider text-[8px] uppercase">Off</p>
                        <p id="shutdown-countdown" class="text-2xl text-white font-mono">--:--</p>
                    </div>
                </footer>
            </div>

            <!-- Right Card: QRIS Panel -->
            <div class="bg-card border border-[#2a2a2a] rounded-2xl p-8 lg:p-10 shadow-2xl flex flex-col justify-center items-center text-center">
                <header class="mb-6 w-full text-left">
                    <h2 class="text-2xl lg:text-3xl font-extrabold tracking-tight text-white">Pembayaran QRIS</h2>
                </header>

                <div class="my-auto flex flex-col items-center justify-center p-4 bg-white rounded-2xl border border-white/10 shadow-xl max-w-[200px]">
                    <img src="assets/qris/qris.png" alt="QRIS Code" class="w-full h-auto rounded-lg">
                </div>
            </div>
            
        </div>
    </div>

    <!-- 2. BILLING OVERLAY (MODE MELAYANG) -->
    <div id="billing-overlay" class="hidden w-full h-full p-0 flex flex-col bg-transparent overflow-hidden">
        <div class="w-full h-full bg-card border border-[#2a2a2a] rounded-none p-6 flex flex-col shadow-none">
            <div class="flex justify-between items-start mb-6">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></div>
                    <span class="text-[10px] font-bold text-accent uppercase tracking-wider">Sesi Aktif</span>
                </div>
                <button id="minimize-btn"
                    class="p-1.5 hover:bg-white/10 rounded-lg text-white/20 hover:text-white transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4" />
                    </svg>
                </button>
            </div>

            <div class="flex-1 space-y-4">
                <div class="flex items-center">
                    <span class="text-[10px] font-bold text-neutral-500 uppercase tracking-wider w-20">Nama PC</span>
                    <span class="text-[13px] font-bold pc-name-display" id="overlay-pc-name">PC-01</span>
                </div>
                <div class="flex items-center">
                    <span class="text-[10px] font-bold text-neutral-500 uppercase tracking-wider w-20">Grup</span>
                    <span class="text-[13px] font-bold text-accent" id="overlay-group">: TM</span>
                </div>
                <div class="flex items-center">
                    <span class="text-[10px] font-bold text-neutral-500 uppercase tracking-wider w-20">Member</span>
                    <span class="text-[13px] font-bold truncate" id="overlay-member-name">: -</span>
                </div>
                <div class="w-full h-px bg-[#2a2a2a] my-3"></div>
                <div class="space-y-1">
                    <span class="text-[9px] font-bold text-accent/70 uppercase tracking-wider">Sisa Waktu</span>
                    <p class="text-2xl font-bold tracking-tight text-white whitespace-nowrap" id="overlay-time">00:00</p>
                </div>
            </div>

            <button id="logout-btn"
                class="w-full bg-[#1a1a1a] hover:bg-red-650/10 border border-[#2a2a2a] hover:border-red-500/30 py-3 rounded-xl flex items-center justify-center gap-2 transition-all text-neutral-400 hover:text-red-400 mt-4">
                <span class="text-[10px] font-bold uppercase tracking-wider">Akhiri Sesi</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z"
                        clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    </div>

    <!-- 3. MODAL LOGIN ADMIN (OVERLAY MODAL) -->
    <div id="admin-modal"
        class="hidden fixed inset-0 z-[999] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-in fade-in duration-300">
        <div class="w-[360px] bg-card border border-[#2a2a2a] rounded-2xl p-8 shadow-2xl space-y-6">
            <header>
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></div>
                    <span class="text-[9px] font-bold tracking-widest text-accent uppercase">Admin Access</span>
                </div>
                <h2 class="text-xl font-bold">Log-in Sistem</h2>
            </header>

            <div class="space-y-3">
                <input type="text" id="admin-user" placeholder="Admin Username"
                    class="w-full bg-white/5 border border-[#2a2a2a] rounded-xl px-5 py-3.5 text-sm outline-none focus:border-neutral-400 focus:bg-white/10 transition-colors">
                <input type="password" id="admin-pass" placeholder="Admin Password"
                    class="w-full bg-white/5 border border-[#2a2a2a] rounded-xl px-5 py-3.5 text-sm outline-none focus:border-neutral-400 focus:bg-white/10 transition-colors">
                <div id="admin-error" class="text-[10px] text-red-400 hidden">Username atau Password salah!</div>
            </div>

            <div class="flex gap-3 pt-2">
                <button id="admin-close-btn"
                    class="flex-1 bg-[#1a1a1a] border border-[#2a2a2a] hover:bg-[#222] py-3 rounded-xl text-[10px] font-bold uppercase tracking-wider text-neutral-400 transition-all">Batal</button>
                <button id="admin-login-confirm-btn"
                    class="flex-1 bg-white hover:bg-neutral-200 text-black py-3 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all">Masuk</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-10 right-10 z-[9999] space-y-3 pointer-events-none"></div>

    <!-- 4. MODAL KONFIRMASI LOGOUT -->
    <div id="logout-confirm-modal"
        class="hidden fixed inset-0 z-[1000] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-in fade-in duration-300">
        <div class="w-[280px] bg-card border border-[#2a2a2a] rounded-2xl p-6 shadow-2xl space-y-5 text-center">
            <header class="flex flex-col items-center">
                <div class="w-10 h-10 bg-red-500/10 rounded-full flex items-center justify-center mb-3 text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </div>
                <h2 class="text-lg font-bold">Akhiri Sesi?</h2>
                <p class="text-[10px] text-neutral-500 mt-1 uppercase tracking-wider font-bold">Yakin ingin keluar?</p>
            </header>
    
            <div class="flex gap-2 pt-2">
                <button id="logout-cancel-btn"
                    class="flex-1 bg-[#1a1a1a] border border-[#2a2a2a] hover:bg-[#222] py-3 rounded-xl text-[10px] font-bold uppercase tracking-wider text-neutral-400 transition-all">Tidak</button>
                <button id="logout-confirm-btn"
                    class="flex-1 bg-red-650/10 hover:bg-red-600 border border-red-500/20 py-3 rounded-xl text-[10px] font-bold uppercase tracking-wider text-red-400 hover:text-white transition-all">Ya</button>
            </div>
        </div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>

</html>
